version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - cyclop
    - errcheck
    - errorlint
    - exhaustive
    - gocognit
    - gosec
    - ineffassign
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    cyclop:
      max-complexity: 10
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      min-complexity: 15
    revive:
      severity: error
      rules:
        - name: file-length-limit
          arguments:
            - max: 800
              skip-comments: true
              skip-blank-lines: true
          exclude:
            - "**/*_test.go"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
