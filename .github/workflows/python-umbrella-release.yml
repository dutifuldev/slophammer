name: Python Umbrella Release

on:
  push:
    tags:
      - "python-umbrella/v*"

concurrency:
  group: python-umbrella-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    # PyPI trusted publishing requires a GitHub-hosted runner.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: python-umbrella
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - run: uv sync

      - name: Validate release tag
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main --depth=1

          uv run python - <<'PY'
          import os
          import re
          import subprocess
          import sys
          import tomllib

          release_tag = os.environ.get("RELEASE_TAG", "")
          release_sha = os.environ.get("RELEASE_SHA", "")

          if not re.fullmatch(r"python-umbrella/v\d+\.\d+\.\d+", release_tag):
              sys.exit(
                  "Python umbrella release tags must match "
                  f"python-umbrella/vX.Y.Z; received {release_tag or '<missing>'}."
              )

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          expected = f"python-umbrella/v{version}"
          if release_tag != expected:
              sys.exit(
                  f"Release tag {release_tag} does not match pyproject version {version}; "
                  f"expected {expected}."
              )

          ancestor = subprocess.run(
              ["git", "merge-base", "--is-ancestor", release_sha, "origin/main"],
              check=False,
          )
          if ancestor.returncode != 0:
              sys.exit(f"Tagged commit {release_sha} is not contained in origin/main.")

          print(f"Release tag {release_tag} matches pyproject.toml and points to origin/main.")
          PY

      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          status="$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/slophammer/$version/json")"
          if [ "$status" = "200" ]; then
            echo "slophammer@$version is already published on PyPI."
            exit 1
          fi
          echo "Publishing slophammer@$version"

      - name: Validate umbrella package
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run ty check src
          uv run pytest

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#python-umbrella/v}"
          notes_file="$(mktemp)"

          cat > "$notes_file" <<EOF
          Published the bare Slophammer command package to PyPI.

          Install with:

          \`\`\`sh
          uv tool install slophammer==$version
          \`\`\`

          Package: https://pypi.org/project/slophammer/$version/
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "slophammer v$version" \
              --notes-file "$notes_file" \
              --draft=false \
              --prerelease=false \
              --verify-tag
          else
            gh release create "$tag" \
              --title "slophammer v$version" \
              --notes-file "$notes_file" \
              --verify-tag
          fi
