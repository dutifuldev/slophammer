name: Python Release

on:
  push:
    tags:
      - "python/v*"

concurrency:
  group: python-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    # PyPI trusted publishing requires a GitHub-hosted runner.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false

      - uses: dtolnay/rust-toolchain@stable

      - run: uv sync --frozen

      - name: Validate release tag
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main --depth=1

          uv run python - <<'PY'
          import os
          import re
          import subprocess
          import sys
          import tomllib

          release_tag = os.environ.get("RELEASE_TAG", "")
          release_sha = os.environ.get("RELEASE_SHA", "")

          if not re.fullmatch(r"python/v\d+\.\d+\.\d+", release_tag):
              sys.exit(
                  f"Python release tags must match python/vX.Y.Z; received {release_tag or '<missing>'}."
              )

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          expected = f"python/v{version}"
          if release_tag != expected:
              sys.exit(
                  f"Release tag {release_tag} does not match pyproject version {version}; expected {expected}."
              )

          ancestor = subprocess.run(
              ["git", "merge-base", "--is-ancestor", release_sha, "origin/main"],
              check=False,
          )
          if ancestor.returncode != 0:
              sys.exit(f"Tagged commit {release_sha} is not contained in origin/main.")

          print(f"Release tag {release_tag} matches pyproject.toml and points to origin/main.")
          PY

      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          status="$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/slophammer-py/$version/json")"
          if [ "$status" = "200" ]; then
            echo "slophammer-py@$version is already published on PyPI."
            exit 1
          fi
          echo "Publishing slophammer-py@$version"

      - name: Validate Python implementation
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run ty check src
          uv run pytest --cov=src/slophammer --cov-fail-under=85
          uv run slophammer-py check ..

      - name: Validate shared conformance
        working-directory: .
        run: |
          npm ci --prefix typescript
          node scripts/check-conformance.mjs

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#python/v}"
          notes_file="$(mktemp)"

          cat > "$notes_file" <<EOF
          Published the Slophammer Python CLI to PyPI.

          Install with:

          \`\`\`sh
          uv tool install slophammer-py==$version
          \`\`\`

          Package: https://pypi.org/project/slophammer-py/$version/
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "slophammer-py v$version" \
              --notes-file "$notes_file" \
              --draft=false \
              --prerelease=false \
              --verify-tag
          else
            gh release create "$tag" \
              --title "slophammer-py v$version" \
              --notes-file "$notes_file" \
              --verify-tag
          fi
