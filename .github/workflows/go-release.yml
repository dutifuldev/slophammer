name: Go Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Go release tag to validate, for example go/v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "go/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^go/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "invalid Go release tag: $tag" >&2
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "release tag does not exist locally: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#go/}" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        run: git checkout --detach "${{ steps.release.outputs.tag }}"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.0
          working-directory: go
          args: ./...

      - name: Validate Go implementation
        working-directory: go
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...
          ./scripts/check-go-coverage.sh
          go build ./cmd/slophammer-go
          ./scripts/check-go-install.sh
          go run ./cmd/slophammer-go check ..
          go run ./cmd/slophammer-go check .. --execute

      - uses: astral-sh/setup-uv@v7
      - name: Sync the Python implementation
        working-directory: .
        run: uv sync --frozen --directory python
      - name: Mutation gate on changes since the last stamp
        working-directory: go
        run: go run ./cmd/slophammer-go mutate ..

      - name: Validate shared conformance
        run: |
          npm ci --prefix typescript
          node scripts/check-conformance.mjs

      - name: Verify tagged go install
        if: github.event_name == 'push'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          tmp="$(mktemp -d)"
          GOBIN="$tmp/bin" go install "github.com/dutifuldev/slophammer/go/cmd/slophammer-go@$RELEASE_VERSION"
          "$tmp/bin/slophammer-go" help
          "$tmp/bin/slophammer-go" rules --format json

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          notes_file="$(mktemp)"

          cat > "$notes_file" <<EOF
          Released the Slophammer Go CLI.

          Install with:

          \`\`\`sh
          go install github.com/dutifuldev/slophammer/go/cmd/slophammer-go@$version
          \`\`\`
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "slophammer-go $version" \
              --notes-file "$notes_file" \
              --draft=false \
              --prerelease=false \
              --verify-tag
          else
            gh release create "$tag" \
              --title "slophammer-go $version" \
              --notes-file "$notes_file" \
              --verify-tag
          fi
