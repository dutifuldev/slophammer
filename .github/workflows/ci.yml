name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check markdown links to local files
        run: node scripts/check-doc-links.mjs
      - name: Check fixture contract completeness
        run: |
          for fixture in fixtures/expected/*.json; do
            test -d "fixtures/repos/$(basename "$fixture" .json)"
          done
      - name: Check Rust packaging shape
        run: |
          test -f rust/Cargo.lock
          test -f rust/crates/slophammer-cli/Cargo.toml
          test ! -d rust/crates/slophammer-core
          test ! -d rust/crates/slophammer-rust
      - run: npx -y @simpledoc/simpledoc check

  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Run the Slophammer action against a clean fixture
        uses: ./
        with:
          checker: go
          version: 0.2.0
          args: check fixtures/repos/go-clean

  go-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: templates/go/go.mod
          cache: false
      - run: go test ./...
      - run: go vet ./...

  go-implementation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Check gofmt
        run: |
          test -z "$(gofmt -l .)"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.0
          working-directory: go
          args: ./...
      - run: go vet ./...
      - run: go test ./...
      - run: ./scripts/check-go-coverage.sh
      - run: go build ./cmd/slophammer
      - run: go build ./cmd/slophammer-go
      - run: ./scripts/check-go-install.sh
      - run: go run ./cmd/slophammer-go dry ..
      - run: go run ./cmd/slophammer-go crap ..
      - run: go run ./cmd/slophammer-go mutate .. --scan
      - run: go run ./cmd/slophammer-go check ..
      - run: go run ./cmd/slophammer-go check .. --execute

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src tests
      - run: pytest

  typescript-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run check

  sarif:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Generate Slophammer SARIF
        working-directory: go
        run: |
          set +e
          go run ./cmd/slophammer-go check .. --format sarif > ../slophammer.sarif
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
            exit "$status"
          fi
          test -s ../slophammer.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: slophammer.sarif

  typescript-implementation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run check
      - run: node ../scripts/check-conformance.mjs

  rust-implementation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install Rust quality tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-mutants --locked
      - name: Resolve Rust package tag
        id: rust-package
        run: |
          version="$(
            awk '
              /^\[workspace.package\]/ { in_workspace_package = 1; next }
              /^\[/ { in_workspace_package = 0 }
              in_workspace_package && /^version = / {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          echo "tag=rust/v$version" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo llvm-cov --workspace --fail-under-lines 85
      - run: cargo audit
      - run: cargo mutants --workspace --list
      - run: scripts/publish-crate.sh --tag "${{ steps.rust-package.outputs.tag }}" --dry-run
      - run: scripts/test-packaged-crate.sh
      - run: scripts/install-packaged-cli.sh
      - run: slophammer-rs --version
      - run: slophammer-rs help
      - run: slophammer-rs rules --format json
      - run: slophammer-rs check ../fixtures/repos/rust-clean --format json
      - run: slophammer-rs dry .. --format json
      - run: slophammer-rs boundaries .. --format json
      - run: slophammer-rs unsafe .. --format json
      - run: slophammer-rs check .. --format json
