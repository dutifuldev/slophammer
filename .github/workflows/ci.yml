name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check markdown links to local files
        run: |
          test -f README.md
          test -f LICENSE
          test -f AGENTS.md
          test -f docs/2026-05-12-guardrails.md
          test -f specs/PRODUCT.md
          test -f specs/RULES.md
          test -f specs/CONFIG.md
          test -f specs/REPORT_FORMAT.md
          test -f specs/EXIT_CODES.md
          test -f specs/rules.json
          test -f fixtures/repos/clean/README.md
          test -f fixtures/repos/go-clean/README.md
          test -f fixtures/expected/clean.json
          test -f fixtures/expected/go-clean.json
      - run: npx -y @simpledoc/simpledoc check

  go-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: templates/go/go.mod
          cache: false
      - run: go test ./...
      - run: go vet ./...

  go-implementation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Check gofmt
        run: |
          test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - run: ./scripts/check-go-coverage.sh
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.0
          working-directory: go
      - run: go build ./cmd/slophammer
      - run: go run ./cmd/slophammer go dry . --max-candidates 40
      - run: go run ./cmd/slophammer go crap . --max-score 30
      - run: go run ./cmd/slophammer go mutate . --target internal/rules/rules.go --scan
      - run: go run ./cmd/slophammer check ..

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src tests
      - run: pytest

  typescript-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run check
