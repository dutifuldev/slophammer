name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check markdown links to local files
        run: |
          test -f README.md
          test -f LICENSE
          test -f AGENTS.md
          test -f slophammer.yml
          test -f scripts/check-conformance.mjs
          test -f docs/2026-05-12-guardrails.md
          test -f docs/2026-05-16-typescript-implementation.md
          test -f docs/2026-05-17-release-hardening-roadmap.md
          test -f specs/PRODUCT.md
          test -f specs/RULES.md
          test -f specs/CONFIG.md
          test -f specs/REPORT_FORMAT.md
          test -f specs/EXIT_CODES.md
          test -f specs/rules.json
          test -f fixtures/repos/clean/README.md
          test -f fixtures/repos/go-clean/README.md
          test -f fixtures/repos/go-bad-dependency/slophammer.yml
          test -f fixtures/expected/clean.json
          test -f fixtures/expected/go-clean.json
          test -f fixtures/expected/go-bad-dependency.json
          test -f fixtures/repos/typescript-clean/README.md
          test -f fixtures/expected/typescript-clean.json
          test -f fixtures/repos/adoption-before/SLOPHAMMER_REMEDIATION.md
          test -f fixtures/expected/adoption-before.json
      - run: npx -y @simpledoc/simpledoc check

  go-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: templates/go/go.mod
          cache: false
      - run: go test ./...
      - run: go vet ./...

  go-implementation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Check gofmt
        run: |
          test -z "$(gofmt -l .)"
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh |
            sh -s -- -b "$(go env GOPATH)/bin" v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: golangci-lint fmt --diff
      - run: go vet ./...
      - run: go test ./...
      - run: ./scripts/check-go-coverage.sh
      - run: golangci-lint run
      - run: go build ./cmd/slophammer
      - run: go build ./cmd/slophammer-go
      - run: ./scripts/check-go-install.sh
      - run: go run ./cmd/slophammer-go dry ..
      - run: go run ./cmd/slophammer-go crap ..
      - run: go run ./cmd/slophammer-go mutate .. --scan
      - run: go run ./cmd/slophammer-go check ..
      - run: go run ./cmd/slophammer-go check .. --execute

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src tests
      - run: pytest

  typescript-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run check

  sarif:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Generate Slophammer SARIF
        working-directory: go
        run: |
          set +e
          go run ./cmd/slophammer-go check .. --format sarif > ../slophammer.sarif
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
            exit "$status"
          fi
          test -s ../slophammer.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: slophammer.sarif

  typescript-implementation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - run: npm ci
      - run: npm run check
      - run: node ../scripts/check-conformance.mjs
