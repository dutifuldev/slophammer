name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check markdown links to local files
        run: |
          test -f README.md
          test -f LICENSE
          test -f AGENTS.md
          test -f docs/guardrails.md

  go-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: templates/go/go.mod
          cache: false
      - run: go test ./...
      - run: go vet ./...

  python-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src tests
      - run: pytest

  typescript-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run check
