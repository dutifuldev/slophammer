name: Rust Release Dry Run

on:
  push:
    tags:
      - "rust/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-release-dry-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false
      - name: Verify Rust tag shape
        if: github.ref_type == 'tag'
        run: |
          case "${GITHUB_REF_NAME}" in
            rust/v*) ;;
            *) echo "Rust release tags must match rust/vX.Y.Z"; exit 1 ;;
          esac
      - name: Resolve package tag
        id: package
        run: |
          version="$(
            awk '
              /^\[workspace.package\]/ { in_workspace_package = 1; next }
              /^\[/ { in_workspace_package = 0 }
              in_workspace_package && /^version = / {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="rust/v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: scripts/publish-crate.sh --tag "${{ steps.package.outputs.tag }}" --dry-run
      - run: scripts/test-packaged-crate.sh
      - run: scripts/install-packaged-cli.sh
      - run: slophammer-rs --version
      - run: slophammer-rs help
      - run: slophammer-rs rules --format json
      - run: slophammer-rs check ../fixtures/repos/rust-clean --format json
      - run: slophammer-rs dry .. --format json
      - run: slophammer-rs boundaries .. --format json
      - run: slophammer-rs unsafe .. --format json
      - run: npm ci
        working-directory: typescript
      - run: node ../scripts/check-conformance.mjs
