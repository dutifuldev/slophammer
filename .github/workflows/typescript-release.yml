name: TypeScript Release

on:
  push:
    tags:
      - "typescript/v*"

concurrency:
  group: typescript-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    # npm trusted publishing + provenance requires a GitHub-hosted runner.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          check-latest: true
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache: false

      - run: npm ci

      - name: Validate package metadata for trusted publishing
        run: |
          node - <<'NODE'
          const { readFileSync } = require("node:fs");

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedName = "slophammer-ts";
          const expectedRepoUrl = "https://github.com/dutifuldev/slophammer";
          const expectedDirectory = "typescript";
          const expectedBin = "dist/src/cli/main.js";

          const normalizeRepoUrl = (value) =>
            String(value ?? "")
              .trim()
              .replace(/^git\+/, "")
              .replace(/\.git$/i, "")
              .replace(/\/+$/, "");

          const actualRepoUrl = normalizeRepoUrl(pkg?.repository?.url);
          const expectedRepoUrlNormalized = normalizeRepoUrl(expectedRepoUrl);
          const errors = [];

          if (pkg?.name !== expectedName) {
            errors.push(`package.json name must be ${expectedName}; found ${pkg?.name ?? "<missing>"}`);
          }
          if (pkg?.private === true) {
            errors.push("package.json must not be private for npm publishing.");
          }
          if (actualRepoUrl !== expectedRepoUrlNormalized) {
            errors.push(
              `package.json repository.url must resolve to ${expectedRepoUrlNormalized}; found ${actualRepoUrl || "<missing>"}`
            );
          }
          if (pkg?.repository?.directory !== expectedDirectory) {
            errors.push(
              `package.json repository.directory must be ${expectedDirectory}; found ${pkg?.repository?.directory ?? "<missing>"}`
            );
          }
          if (pkg?.publishConfig?.access !== "public") {
            errors.push("package.json publishConfig.access must be public.");
          }
          if (pkg?.bin?.["slophammer-ts"] !== expectedBin) {
            errors.push(
              `package.json bin.slophammer-ts must be ${expectedBin}; found ${pkg?.bin?.["slophammer-ts"] ?? "<missing>"}`
            );
          }
          if (Object.prototype.hasOwnProperty.call(pkg?.bin ?? {}, "slophammer")) {
            errors.push("package.json must not publish the reserved slophammer bin.");
          }

          if (errors.length > 0) {
            for (const err of errors) {
              console.error(err);
            }
            process.exit(1);
          }

          console.log("Package metadata validated.");
          NODE

      - name: Validate release tag
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main --depth=1

          node - <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { readFileSync } = require("node:fs");

          const releaseTag = process.env.RELEASE_TAG ?? "";
          const releaseSha = process.env.RELEASE_SHA ?? "";
          const semverTag = /^typescript\/v\d+\.\d+\.\d+$/;

          if (!semverTag.test(releaseTag)) {
            console.error(
              `TypeScript release tags must match typescript/vX.Y.Z; received ${releaseTag || "<missing>"}.`
            );
            process.exit(1);
          }

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedTag = `typescript/v${pkg.version}`;

          if (releaseTag !== expectedTag) {
            console.error(
              `Release tag ${releaseTag} does not match package.json version ${pkg.version}; expected ${expectedTag}.`
            );
            process.exit(1);
          }

          try {
            execFileSync(
              "git",
              ["merge-base", "--is-ancestor", releaseSha, "origin/main"],
              { stdio: "ignore" }
            );
          } catch {
            console.error(
              `Tagged commit ${releaseSha} is not contained in origin/main.`
            );
            process.exit(1);
          }

          console.log(
            `Release tag ${releaseTag} matches package.json and points to a commit on origin/main.`
          );
          NODE

      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view "slophammer-ts@$package_version" version 2>/dev/null || true)"

          if [ "$published_version" = "$package_version" ]; then
            echo "slophammer-ts@$package_version is already published on npm."
            exit 1
          fi

          echo "Publishing slophammer-ts@$package_version"

      - name: Validate TypeScript implementation
        run: npm run check

      - uses: astral-sh/setup-uv@v7
      - name: Sync the Python implementation
        working-directory: .
        run: uv sync --frozen --directory python
      - name: Validate shared conformance
        working-directory: .
        run: node scripts/check-conformance.mjs

      - name: Publish
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#typescript/v}"
          notes_file="$(mktemp)"

          cat > "$notes_file" <<EOF
          Published the Slophammer TypeScript CLI to npm.

          Install with:

          \`\`\`sh
          npm install -g slophammer-ts@$version
          \`\`\`

          Package: https://www.npmjs.com/package/slophammer-ts/v/$version
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "slophammer-ts v$version" \
              --notes-file "$notes_file" \
              --draft=false \
              --prerelease=false \
              --verify-tag
          else
            gh release create "$tag" \
              --title "slophammer-ts v$version" \
              --notes-file "$notes_file" \
              --verify-tag
          fi
