go:
  coverage_threshold: 85
  dry:
    max_findings: 0
    paths:
      - go/cmd
      - go/internal
    exclude:
      - "**/*_test.go"
      - "fixtures/**"
      - "templates/**"
    structural:
      enabled: true
      threshold: 0.82
      min_lines: 4
      min_nodes: 20
    copied_blocks:
      enabled: true
      min_tokens: 100
  crap_max_score: 8
  mutation_targets:
    - go/internal/rules/rules.go
  dependency_boundaries:
    - from: go/cmd/slophammer
      allow:
        - go/internal/cli
    - from: go/internal/cli
      allow:
        - go/internal/app
        - go/internal/toolchecks
    - from: go/internal/app
      allow:
        - go/internal/config
        - go/internal/repo
        - go/internal/report
        - go/internal/rules
        - go/internal/scan
        - go/internal/toolchecks
    - from: go/internal/config
      allow:
        - go/internal/repo
    - from: go/internal/report
      allow:
        - go/internal/rules
    - from: go/internal/rules
      allow:
        - go/internal/config
        - go/internal/gotools
        - go/internal/repo
    - from: go/internal/scan
      allow:
        - go/internal/repo
    - from: go/internal/toolchecks
      allow:
        - go/internal/dry
        - go/internal/gotools
    - from: go/internal/dry
      allow: []
    - from: go/internal/gotools
      allow: []
    - from: go/internal/repo
      allow: []
