go:
  coverage_threshold: 85
  targets:
    - .
  exclude:
    - "fixtures/**"
    - "templates/**"
  dry:
    max_findings: 0
    paths:
      - go/cmd
      - go/internal
    exclude:
      - "**/*_test.go"
      - "fixtures/**"
      - "templates/**"
    structural:
      enabled: true
      threshold: 0.82
      min_lines: 4
      min_nodes: 20
    copied_blocks:
      enabled: true
      min_tokens: 100
  crap_max_score: 8
  dependency_boundaries:
    - from: go/cmd/slophammer
      allow:
        - go/internal/cli
    - from: go/cmd/slophammer-go
      allow:
        - go/internal/cli
    - from: go/internal/cli
      allow:
        - go/internal/app
        - go/internal/toolchecks
    - from: go/internal/app
      allow:
        - go/internal/config
        - go/internal/gotargets
        - go/internal/repo
        - go/internal/report
        - go/internal/rules
        - go/internal/scan
        - go/internal/toolchecks
    - from: go/internal/config
      allow:
        - go/internal/repo
    - from: go/internal/gotargets
      allow:
        - go/internal/repo
    - from: go/internal/report
      allow:
        - go/internal/rules
    - from: go/internal/rules
      allow:
        - go/internal/config
        - go/internal/gotargets
        - go/internal/gotools
        - go/internal/repo
    - from: go/internal/scan
      allow:
        - go/internal/repo
    - from: go/internal/toolchecks
      allow:
        - go/internal/dry
        - go/internal/gotools
    - from: go/internal/dry
      allow: []
    - from: go/internal/gotools
      allow: []
    - from: go/internal/repo
      allow: []
typescript:
  coverage_threshold: 85
  complexity_max: 8
  dry:
    max_findings: 0
    paths:
      - typescript/src
    exclude:
      - "**/*.test.ts"
      - "**/*.spec.ts"
      - "typescript/fixtures/**"
      - "typescript/dist/**"
      - "typescript/coverage/**"
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation_targets:
    - typescript/src/rules/rules.ts
  dependency_boundaries:
    - from: typescript/src/cli
      allow:
        - typescript/src/cli
        - typescript/src/app
        - typescript/src/dry
    - from: typescript/src/app
      allow:
        - typescript/src/config
        - typescript/src/dry
        - typescript/src/repo
        - typescript/src/report
        - typescript/src/rules
        - typescript/src/scan
        - typescript/src/toolchecks
    - from: typescript/src/config
      allow:
        - typescript/src/repo
        - typescript/src/rules
    - from: typescript/src/report
      allow:
        - typescript/src/rules
    - from: typescript/src/rules
      allow:
        - typescript/src/config
        - typescript/src/repo
        - typescript/src/rules
    - from: typescript/src/scan
      allow:
        - typescript/src/repo
    - from: typescript/src/toolchecks
      allow:
        - typescript/src/rules
    - from: typescript/src/dry
      allow:
        - typescript/src/dry
    - from: typescript/src/repo
      allow: []
